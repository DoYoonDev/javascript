<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숫자맞추기게임</title>
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"> -->
    <link rel="stylesheet" href="style.css">    
</head>
<body>
    <div class="container">
        <h1 class="title">숫자맞추기 게임</h1>
        <h2 id="chance-area">남은 기회: 3</h2>
        <h3 id="answer-area"></h3>
        <h5 id="result-area"></h5>
        <div class="row d-flex justify-content-center">
            <div class="col-md-6">
                <input type="number" id="user-input" class="form-control mb-10" placeholder="1부터 100까지 숫자를 입력" />
            </div>
            <div class="col-md-2">
                <button class="btn btn-success mb-2 button-style" id="play-button">Go!!</button>
            </div>
        </div>
        <button id="reset-button" class="btn btn-warning mt-3 button-style button-reset">리셋!</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
